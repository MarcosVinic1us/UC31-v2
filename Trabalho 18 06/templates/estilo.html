<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cartão de Visitas</title>
  <style>
    /* Estilo geral da página */
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* Container do cartão */
    .cartao {
      background-color: #ffffff;
      width: 350px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      text-align: center;
    }

    /* Nome em destaque */
    .cartao h1 {
      font-size: 1.6em;
      margin: 0;
      color: #333333;
    }

    /* Cargo */
    .cartao h2 {
      font-size: 1.2em;
      margin: 5px 0 15px 0;
      color: #555555;
      font-weight: normal;
    }

    /* Informações de contato */
    .cartao p {
      margin: 8px 0;
      font-size: 0.95em;
      color: #666666;
    }

    /* Links de e-mail e telefone */
    .cartao a {
      color: #0066cc;
      text-decoration: none;
    }

    .cartao a:hover {
      text-decoration: underline;
    }

    /* Botão para voltar ao formulário (/novo) */
    .botao {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background-color: #0066cc;
      color: #ffffff;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
    }

    .botao:hover {
      background-color: #004999;
    }
  </style>
</head>
<body>
  <div class="cartao">
    <h1>Maria Silva</h1>
    <h2>Desenvolvedora Web</h2>
    <p><a href="mailto:maria.silva@email.com">maria.silva@email.com</a></p>
    <p><a href="tel:+5584999999999">(84) 99999-9999</a></p>
    <a href="/novo" class="botao">Novo Cartão</a>
  </div>
</body>
</html>
